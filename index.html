<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="aframe.min.js"></script>
    <script src="mindar-image-aframe.prod.js"></script>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="video0" src="video0.mp4" loop="true" crossorigin="anonymous" muted playsinline></video>
            <video id="video1" src="video1.mp4" loop="true" crossorigin="anonymous" muted playsinline></video>
            <video id="video2" src="video2.mp4" loop="true" crossorigin="anonymous" muted playsinline></video>
	    <video id="video3" src="video3.mp4" loop="true" crossorigin="anonymous" muted playsinline></video>
	    <video id="video4" src="video4.mp4" loop="true" crossorigin="anonymous" muted playsinline></video>
 	    <video id="video5" src="video5.mp4" loop="true" crossorigin="anonymous" muted playsinline></video>
  	    <video id="video6" src="video6.mp4" loop="true" crossorigin="anonymous" muted playsinline></video>
	    <video id="video7" src="video7.mp4" loop="true" crossorigin="anonymous" muted playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#video0" width="1" height="1" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-video src="#video1" width="1" height="1" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 2">
            <a-video src="#video2" width="1" height="1" position="0 0 0"></a-video>
        </a-entity>

	<a-entity mindar-image-target="targetIndex: 3">
            <a-video src="#video3" width="1" height="1" position="0 0 0"></a-video>
        </a-entity>

	<a-entity mindar-image-target="targetIndex: 4">
            <a-video src="#video4" width="1" height="1" position="0 0 0"></a-video>
        </a-entity>

	<a-entity mindar-image-target="targetIndex: 5">
            <a-video src="#video5" width="1" height="1" position="0 0 0"></a-video>
        </a-entity>

	<a-entity mindar-image-target="targetIndex: 6">
            <a-video src="#video6" width="1" height="1" position="0 0 0"></a-video>
        </a-entity>

	<a-entity mindar-image-target="targetIndex: 7">
            <a-video src="#video7" width="1" height="1" position="0 0 0"></a-video>
        </a-entity>

    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const targetEntities = document.querySelectorAll('[mindar-image-target]');

            targetEntities.forEach((el) => {
                const targetSettings = el.getAttribute('mindar-image-target');
                const index = targetSettings.match(/\d+/)[0];
                
                const videoElement = el.querySelector('a-video');
                const videoAsset = document.querySelector(videoElement.getAttribute('src'));

                el.addEventListener("targetFound", () => {
                    console.log(`Маркер №${index} найден`);
                    videoAsset.play();
                });

                el.addEventListener("targetLost", () => {
                    console.log(`Маркер №${index} потерян`);
                    videoAsset.pause();
                });
            });

            document.body.addEventListener('click', () => {
                const allVideos = document.querySelectorAll('video');
                allVideos.forEach(v => {
                    v.play();
                    v.pause();
                });
                console.log("Видео-система готова");
            }, {once: true});
        });
    </script>
</body>
</html>
